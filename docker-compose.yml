services:
  backend:
    build:
      context: ./backend
    container_name: rl-anomaly-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
    container_name: rl-anomaly-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "4200:80"
